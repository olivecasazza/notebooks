name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "requirements.txt"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build marimo WASM app
        run: |
          uv pip install --system -r requirements.txt
          mkdir -p dist/notebooks
          marimo export html-wasm content/pyodide/wigglystuff/parallelcoords.ipynb -o dist/notebooks/parallelcoords.html --mode run --no-show-code
          marimo export html-wasm content/pyodide/wigglystuff/treemap.ipynb -o dist/notebooks/treemap.html --mode run --no-show-code
          marimo export html-wasm content/pyodide/wigglystuff/polynomials.ipynb -o dist/notebooks/polynomials.html --mode run --no-show-code
          # Convert existing jupyter notebooks if needed or just provide a basic index
          cp README.md dist/index.md || true
          # Build jupyterlite as fallback/primary if you still want it:
          jupyter lite build --contents content --output-dir dist/jupyterlite

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
